<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>גישת חירום — כושרמט</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
<link rel="stylesheet" href="css/style.css?v=21" />
</head>
<body>
  <div class="center-page page-enter">
    <div class="card" style="width:100%; max-width:420px;">
      <div class="text-center mt-1" style="margin-bottom:18px;">
        <div style="font-size:44px;">🆘</div>
        <div class="brand-text" style="font-size:24px; font-weight:900;">גישת חירום</div>
        <p class="muted" style="font-size:13px; margin-top:8px;">
          מסך זה מיועד למצבי חירום שבהם ההרשמה הרגילה לא עובדת.
          כתוב את כתובת המייל שלך - הבקשה תישלח מיידית למנהל האתר לאישור,
          ולאחר אישור תקבל קישור כניסה ישיר למייל, ללא תהליך הרשמה.
        </p>
      </div>

      <form id="emergency-form" class="flex flex-col gap-1">
        <div>
          <label>אימייל</label>
          <input type="email" id="emergency-email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-1">שלח בקשה למנהל</button>
      </form>

      <div id="emergency-status" class="muted text-center" style="display:none; margin-top:10px;"></div>

      <p class="text-center mt-2">
        <a href="auth.html" class="linklike" style="font-size:13px;">חזרה למסך ההתחברות הרגיל</a>
      </p>
    </div>
  </div>

  <script src="js/supabase-sdk.js?v=21"></script>
  <script src="js/supabaseClient.js?v=21"></script>
  <script src="js/ui.js?v=21"></script>
  <script src="js/emergency-access.js?v=21"></script>
</body>
</html>
