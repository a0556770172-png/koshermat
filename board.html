function isFullscreenActive() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function toggleFullscreen() {
  const el = document.getElementById("board-wrap");
  if (!el) return;

  if (!isFullscreenActive()) {
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (!req) {
      toast("מסך מלא לא נתמך בדפדפן הזה", "error");
      return;
    }
    req.call(el).catch(() => toast("לא ניתן היה לעבור למסך מלא", "error"));
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
}
window.toggleFullscreen = toggleFullscreen;

function updateFullscreenBtn() {
  const btn = document.getElementById("fullscreen-btn");
  if (!btn) return;
  btn.textContent = isFullscreenActive() ? "✕" : "⛶";
  btn.title = isFullscreenActive() ? "יציאה ממסך מלא" : "מסך מלא";
}
document.addEventListener("fullscreenchange", updateFullscreenBtn);
document.addEventListener("webkitfullscreenchange", updateFullscreenBtn);

let ME = null;
let GAME = null;
let MY_COLOR = null; // 'w' | 'b' | null (spectator)
let chess = null;
let selectedSquare = null;
let legalTargets = [];
let lastMoveSquares = [];
let gameEnded = false;
let timerInterval = null;
let pendingPromotion = null;

// ---------------- משחק נגד המחשב (AI) ----------------
let IS_AI_GAME = false;
let AI_LEVEL = 10;
let AI_WORKER = null;
let AI_THINKING = false;

// מזהה המשחק נשמר בזיכרון הדפדפן (לא בכתובת) כדי שהכתובת תישאר נקייה
// (מותאם גם לרשתות עם סינון תוכן שחוסם כתובות עם מחרוזות מספרים ארוכות).
// יש גם תמיכה בקישורים ישנים (#id או ?id=) למקרה שמישהו כבר שמר כאלה.
const GAME_ID =
  sessionStorage.getItem("koshermat_game_id") ||
  decodeURIComponent(location.hash.slice(1)) ||
  new URLSearchParams(location.search).get("id");

(async function init() {
  try {
    const auth = await requireAuth();
    if (!auth) return;
    ME = auth.profile;
    renderNav("", ME);

    const aiConfig = getAiConfig();
    if (aiConfig) {
      await initAiGame(aiConfig);
      wireControls();
      return;
    }

    if (!GAME_ID) {
      showFatalError("לא נמצא מזהה משחק. אם הגעת לכאן ישירות (לא דרך כפתור באתר), חזור ללובי ונסה שוב.");
      return;
    }

    await loadGame();
    if (!GAME) return;

    subscribeGame();
    await loadChat();
    subscribeChat();
    startTimerLoop();
    wireControls();
  } catch (err) {
    console.error(err);
    showFatalError("שגיאה בטעינת המשחק: " + (err && err.message ? err.message : String(err)));
  }
})();

function showFatalError(message) {
  toast(message, "error");
  const boardEl = document.getElementById("board");
  if (boardEl) {
    boardEl.innerHTML = `<div style="grid-column:1/-1; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center; color:var(--danger); font-weight:700;">${escapeHtml(message)}</div>`;
  }
}

async function loadGame() {
  const { data, error } = await sb
    .from("games")
    .select("*, white:white_id(id, username, rating, avatar_emoji), black:black_id(id, username, rating, avatar_emoji)")
    .eq("id", GAME_ID)
    .single();

  if (error || !data) {
    showFatalError("המשחק לא נמצא" + (error ? " (" + error.message + ")" : "") + ". חוזר ללובי...");
    setTimeout(() => (location.href = "lobby.html"), 3000);
    return;
  }
  GAME = data;
  MY_COLOR = GAME.white_id === ME.id ? "w" : GAME.black_id === ME.id ? "b" : null;

  chess = new Chess();
  chess.load(GAME.fen);

  renderPlayers();
  renderBoard();
  renderMoveList();
  renderCapturedPieces();
  updateTimersDisplay();
  updateControlsVisibility();
  updateTurnBanner();
  updateLastMoveInfo();

  if (GAME.status !== "active") {
    showEndOverlay();
  }
}

function orientation() {
  return MY_COLOR === "b" ? "black" : "white";
}

function renderPlayers() {
  document.getElementById("white-name").textContent = `⚪ ${GAME.white?.username || "ממתין..."} (${GAME.white?.rating ?? "-"})`;
  document.getElementById("black-name").textContent = `⚫ ${GAME.black?.username || "ממתין..."} (${GAME.black?.rating ?? "-"})`;
}

// ---------------- באנר תור + תיאור מהלך אחרון ----------------
function updateTurnBanner() {
  const banner = document.getElementById("turn-banner");
  const text = document.getElementById("turn-banner-text");
  if (!banner || !text || !GAME) return;

  if (GAME.status !== "active") {
    banner.classList.remove("my-turn");
    text.textContent = "המשחק הסתיים";
    return;
  }

  const turnColor = chess.turn();
  const turnName = turnColor === "w" ? "לבן" : "שחור";

  if (!MY_COLOR) {
    text.textContent = `תור ${turnName}`;
    banner.classList.remove("my-turn");
    return;
  }

  if (turnColor === MY_COLOR) {
    text.textContent = "🟢 התור שלך למהלך";
    banner.classList.add("my-turn");
  } else {
    text.textContent = IS_AI_GAME && AI_THINKING ? "🤖 המחשב חושב..." : `⏳ ממתין למהלך של היריב (${turnName})`;
    banner.classList.remove("my-turn");
  }
}

function updateLastMoveInfo() {
  const el = document.getElementById("last-move-info");
  if (!el) return;
  const history = chess.history({ verbose: true });
  const last = history[history.length - 1];
  if (!last) {
    el.textContent = "";
    return;
  }
  const moverName = last.color === "w" ? "לבן" : "שחור";
  const pieceName = PIECE_NAME_HE[last.piece] || last.piece;
  const captureText = last.captured ? ` ותפס ${PIECE_NAME_HE[last.captured] || last.captured}` : "";
  const checkText = last.san.includes("#") ? " - שח-מט!" : last.san.includes("+") ? " - שח!" : "";
  el.innerHTML = `המהלך האחרון: <b>${moverName}</b> הזיז ${pieceName} מ-${last.from} ל-${last.to}${captureText} <span class="muted">(${escapeHtml(last.san)})</span>${checkText}`;
}

// ---------------- Board rendering ----------------
function renderBoard() {
  const board = chess.board();
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  const flip = orientation() === "black";

  for (let displayRow = 0; displayRow < 8; displayRow++) {
    for (let displayCol = 0; displayCol < 8; displayCol++) {
      const row = flip ? 7 - displayRow : displayRow;
      const col = flip ? 7 - displayCol : displayCol;
      const file = "abcdefgh"[col];
      const rank = 8 - row;
      const squareName = `${file}${rank}`;
      const piece = board[row][col];

      const sq = document.createElement("div");
      sq.className = "square " + ((row + col) % 2 === 0 ? "light" : "dark");
      sq.dataset.square = squareName;

      if (lastMoveSquares.includes(squareName)) sq.classList.add("last-move");
      if (selectedSquare === squareName) sq.classList.add("selected");
      if (legalTargets.some((t) => t.to === squareName)) {
        sq.classList.add(legalTargets.find((t) => t.to === squareName).captured ? "legal-capture" : "legal-move");
      }
      if (piece && piece.type === "k" && chess.in_check() && piece.color === chess.turn()) {
        sq.classList.add("in-check");
      }

      if (displayCol === 0) {
        const rankLabel = document.createElement("span");
        rankLabel.className = "coord-label coord-rank";
        rankLabel.textContent = rank;
        sq.appendChild(rankLabel);
      }
      if (displayRow === 7) {
        const fileLabel = document.createElement("span");
        fileLabel.className = "coord-label coord-file";
        fileLabel.textContent = file;
        sq.appendChild(fileLabel);
      }

      if (piece) {
        const span = document.createElement("span");
        span.className = "piece " + (piece.color === "w" ? "piece-white" : "piece-black");
        span.textContent = PIECE_UNICODE[piece.color + piece.type.toUpperCase()];
        sq.appendChild(span);
      }

      sq.addEventListener("click", () => onSquareClick(squareName));
      boardEl.appendChild(sq);
    }
  }
}

function onSquareClick(squareName) {
  if (gameEnded || GAME.status !== "active") return;
  if (!MY_COLOR || chess.turn() !== MY_COLOR) return;

  if (selectedSquare) {
    const move = legalTargets.find((t) => t.to === squareName);
    if (move) {
      if (move.promotion) {
        pendingPromotion = { from: selectedSquare, to: squareName };
        showPromotionModal();
        return;
      }
      makeMove(selectedSquare, squareName);
      return;
    }
    // בחירה מחדש או ביטול
    selectedSquare = null;
    legalTargets = [];
    const piece = chess.get(squareName);
    if (piece && piece.color === MY_COLOR) {
      selectSquare(squareName);
    } else {
      renderBoard();
    }
    return;
  }

  const piece = chess.get(squareName);
  if (piece && piece.color === MY_COLOR) {
    selectSquare(squareName);
  }
}

function selectSquare(squareName) {
  selectedSquare = squareName;
  const moves = chess.moves({ square: squareName, verbose: true });
  legalTargets = moves.map((m) => ({ to: m.to, captured: !!m.captured, promotion: !!m.promotion }));
  renderBoard();

  if (legalTargets.length === 0) {
    // מציגים למה אי אפשר להזיז את הכלי הזה - חשוב במיוחד כשיש שח, כדי
    // שיהיה ברור שהחוק אוכף שרק מהלכים שמסירים את השח מותרים
    const msg = chess.in_check()
      ? "אין לך מהלך חוקי עם הכלי הזה - אתה בשח, וחייב להגן על המלך"
      : "אין לכלי הזה שום מהלך חוקי כרגע (הוא כנראה נעוץ ומגן על המלך)";
    toast(msg, "error");
  }
}

function showPromotionModal() {
  const overlay = document.getElementById("promo-overlay");
  overlay.style.display = "flex";
  const color = MY_COLOR;
  const options = ["q", "r", "b", "n"];
  const wrap = document.getElementById("promo-choices");
  wrap.innerHTML = options
    .map((p) => `<button data-p="${p}" class="${color === "w" ? "piece-white" : "piece-black"}">${PIECE_UNICODE[color + p.toUpperCase()]}</button>`)
    .join("");
  wrap.querySelectorAll("button").forEach((btn) => {
    btn.onclick = () => {
      overlay.style.display = "none";
      makeMove(pendingPromotion.from, pendingPromotion.to, btn.dataset.p);
      pendingPromotion = null;
    };
  });
}

// ---------------- Making moves ----------------
async function makeMove(from, to, promotion) {
  const move = chess.move({ from, to, promotion });
  if (!move) return;

  const previousLastMoveSquares = lastMoveSquares;
  selectedSquare = null;
  legalTargets = [];
  lastMoveSquares = [from, to];
  renderBoard();
  renderMoveList();
  renderCapturedPieces();
  updateTurnBanner();
  updateLastMoveInfo();

  if (move.captured) {
    playCaptureSound();
  } else {
    playMoveSound();
  }
  if (chess.in_check()) {
    playCheckSound();
  }

  const now = Date.now();
  const lastMoveAt = new Date(GAME.last_move_at).getTime();
  const elapsed = now - lastMoveAt;

  if (IS_AI_GAME) {
    if (move.color === "w") GAME.white_time_ms = Math.max(0, GAME.white_time_ms - elapsed);
    else GAME.black_time_ms = Math.max(0, GAME.black_time_ms - elapsed);
    GAME.fen = chess.fen();
    GAME.pgn = chess.pgn();
    GAME.turn = chess.turn();
    GAME.last_move = move.san;
    GAME.last_move_at = new Date().toISOString();

    if (chess.in_checkmate()) {
      aiFinishGame("checkmate", "me");
    } else if (chess.in_draw() || chess.in_stalemate() || chess.in_threefold_repetition()) {
      aiFinishGame("draw", null);
    } else {
      requestAiMove();
    }
    return;
  }

  let whiteMs = GAME.white_time_ms;
  let blackMs = GAME.black_time_ms;
  if (move.color === "w") whiteMs = Math.max(0, whiteMs - elapsed);
  else blackMs = Math.max(0, blackMs - elapsed);

  const update = {
    fen: chess.fen(),
    pgn: chess.pgn(),
    turn: chess.turn(),
    last_move: move.san,
    last_move_at: new Date().toISOString(),
    white_time_ms: whiteMs,
    black_time_ms: blackMs,
    draw_offered_by: null,
  };

  // חשוב: מוסיפים .select() ובודקים כמה שורות באמת התעדכנו - כי אם מדיניות
  // RLS חוסמת את העדכון בשקט (0 שורות עודכנו), sb.from(...).update(...) עדיין
  // מחזיר error=null! זו הסיבה שהמהלך "נראה תקין" מקומית אבל אף פעם לא נשמר
  // בפועל בשרת ולכן היריב לעולם לא רואה אותו.
  const { data, error } = await sb.from("games").update(update).eq("id", GAME_ID).select();
  if (error || !data || data.length === 0) {
    // המהלך לא נשמר בפועל בשרת - מבטלים אותו גם מקומית כדי לא להטעות
    // את השחקן, ומציגים שגיאה מפורשת (לצורך אבחון) במקום הודעה כללית
    chess.undo();
    lastMoveSquares = previousLastMoveSquares;
    renderBoard();
    renderMoveList();
    renderCapturedPieces();
    const msg = error
      ? (error.message || error.details || JSON.stringify(error))
      : "0 שורות עודכנו - כנראה שאין לך הרשאה (RLS) לעדכן את המשחק הזה";
    toast("שגיאה בשליחת המהלך: " + msg, "error");
    return;
  }
  Object.assign(GAME, update);

  if (chess.in_checkmate()) {
    const winnerId = move.color === "w" ? GAME.white_id : GAME.black_id;
    await finishGame("checkmate", winnerId);
  } else if (chess.in_draw() || chess.in_stalemate() || chess.in_threefold_repetition()) {
    await finishGame("draw", null);
  }
}

// ==========================================================
// משחק נגד המחשב - מנוע Stockfish אמיתי (רמות קושי 0-20 של המנוע
// עצמו, לא סימולציה). הכל מתנהל מקומית בדפדפן בלי לגעת ב-Supabase
// בכלל (אין שורת games במסד הנתונים למשחק כזה) - כדי לא להסתבך עם
// יצירת "משתמש בוט" מזויף והרשאות RLS, ובעיקר כי אין צורך: המהלכים
// של המחשב לא צריכים להסתנכרן בין דפדפנים, רק להיות מהירים ואמינים.
// חשוב: משחק נגד המחשב לא נשמר בין רענוני דף - רענון מתחיל משחק חדש.
// ==========================================================
function getAiConfig() {
  try {
    const raw = sessionStorage.getItem("koshermat_ai_config");
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

async function initAiGame(config) {
  IS_AI_GAME = true;
  AI_LEVEL = Math.max(0, Math.min(20, parseInt(config.level, 10) || 10));
  MY_COLOR = config.color === "random" ? (Math.random() < 0.5 ? "w" : "b") : config.color === "b" ? "b" : "w";

  chess = new Chess();
  const aiName = `מחשב (רמה ${AI_LEVEL})`;
  GAME = {
    id: "ai-local",
    status: "active",
    fen: chess.fen(),
    pgn: "",
    turn: "w",
    white_id: MY_COLOR === "w" ? ME.id : null,
    black_id: MY_COLOR === "b" ? ME.id : null,
    white: MY_COLOR === "w" ? ME : { username: aiName, rating: null },
    black: MY_COLOR === "b" ? ME : { username: aiName, rating: null },
    white_time_ms: config.timeControlMs || 600000,
    black_time_ms: config.timeControlMs || 600000,
    time_control_ms: config.timeControlMs || 600000,
    last_move: null,
    last_move_at: new Date().toISOString(),
    winner_id: null,
    draw_offered_by: null,
  };

  // אין צ'אט/דיווח/הצעת תיקו במשחק נגד המחשב - אין עם מי "לדבר"
  const chatCard = document.getElementById("chat-messages")?.closest(".card");
  if (chatCard) chatCard.style.display = "none";
  const reportCard = document.getElementById("report-btn")?.closest(".card");
  if (reportCard) reportCard.style.display = "none";
  const drawBtn = document.getElementById("draw-btn");
  if (drawBtn) drawBtn.style.display = "none";

  renderPlayers();
  renderBoard();
  renderMoveList();
  renderCapturedPieces();
  updateTimersDisplay();
  updateControlsVisibility();
  updateTurnBanner();
  updateLastMoveInfo();
  startTimerLoop();

  await initStockfish();

  if (MY_COLOR === "b") {
    requestAiMove();
  }
}

// טוענים את קובץ המנוע כטקסט (fetch) ועוטפים אותו כ-Blob מקומי לפני
// יצירת ה-Worker - כי דפדפנים חוסמים יצירת Worker ישירות מכתובת של
// אתר אחר (CDN) מטעמי אבטחה (same-origin policy ל-Worker scripts).
// עוטפים ב-Blob "מרמים" את הדפדפן שהסקריפט מגיע מהאתר שלנו עצמו.
// משתמשים בגרסת stockfish.js הקלאסית (asm.js, לא WASM) - קובץ יחיד
// עצמאי לגמרי בלי קבצי .wasm נלווים, כדי שהעטיפה ב-Blob לא תשבור
// טעינות יחסיות פנימיות של קבצים נוספים.
async function initStockfish() {
  const engineUrl = "https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js";
  try {
    const resp = await fetch(engineUrl);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const code = await resp.text();
    const blob = new Blob([code], { type: "application/javascript" });
    const blobUrl = URL.createObjectURL(blob);
    AI_WORKER = new Worker(blobUrl);
  } catch (e) {
    toast("מנוע השחמט לא נטען - בדוק את החיבור לאינטרנט ונסה לרענן את הדף", "error");
    return;
  }
  AI_WORKER.onmessage = (e) => {
    const line = typeof e.data === "string" ? e.data : e.data && e.data.data;
    if (!line) return;
    if (line.startsWith("bestmove")) {
      const parts = line.split(" ");
      const uciMove = parts[1];
      if (!uciMove || uciMove === "(none)") return;
      applyAiMove(uciMove);
    }
  };
  AI_WORKER.onerror = () => {
    toast("שגיאה בהרצת מנוע השחמט - נסה לרענן את הדף", "error");
  };
  AI_WORKER.postMessage("uci");
}

function requestAiMove() {
  if (!AI_WORKER || gameEnded) return;
  AI_THINKING = true;
  updateTurnBanner();

  const skill = AI_LEVEL;
  // ככל שהרמה גבוהה יותר, נותנים למנוע יותר זמן חשיבה - כך שרמה 20
  // באמת חושבת עמוק ומשחקת חזק בצורה יוצאת דופן, לא רק "מדמה" קושי
  const moveTimeMs = 250 + skill * 180;

  AI_WORKER.postMessage("setoption name Skill Level value " + skill);
  AI_WORKER.postMessage("position fen " + chess.fen());
  AI_WORKER.postMessage("go movetime " + moveTimeMs);
}

function applyAiMove(uciMove) {
  AI_THINKING = false;
  const from = uciMove.slice(0, 2);
  const to = uciMove.slice(2, 4);
  const promotion = uciMove.length > 4 ? uciMove.slice(4, 5) : undefined;
  const move = chess.move({ from, to, promotion });
  if (!move) return;

  lastMoveSquares = [from, to];
  renderBoard();
  renderMoveList();
  renderCapturedPieces();
  updateTurnBanner();
  updateLastMoveInfo();

  if (move.captured) {
    playCaptureSound();
  } else {
    playMoveSound();
  }
  if (chess.in_check()) {
    playCheckSound();
  }

  const now = Date.now();
  const lastMoveAt = new Date(GAME.last_move_at).getTime();
  const elapsed = now - lastMoveAt;
  if (move.color === "w") GAME.white_time_ms = Math.max(0, GAME.white_time_ms - elapsed);
  else GAME.black_time_ms = Math.max(0, GAME.black_time_ms - elapsed);
  GAME.fen = chess.fen();
  GAME.pgn = chess.pgn();
  GAME.turn = chess.turn();
  GAME.last_move = move.san;
  GAME.last_move_at = new Date().toISOString();

  if (chess.in_checkmate()) {
    aiFinishGame("checkmate", "ai");
  } else if (chess.in_draw() || chess.in_stalemate() || chess.in_threefold_repetition()) {
    aiFinishGame("draw", null);
  }
}

function aiFinishGame(status, winner) {
  if (gameEnded) return;
  gameEnded = true;
  GAME.status = status;
  GAME.winner_id = winner === "me" ? ME.id : winner === "ai" ? "ai-opponent" : null;
  if (AI_WORKER) {
    try { AI_WORKER.postMessage("quit"); AI_WORKER.terminate(); } catch (e) { /* ignore */ }
  }
  updateTurnBanner();
  updateControlsVisibility();
  showEndOverlay();
}

async function finishGame(status, winnerId) {
  if (gameEnded) return;
  gameEnded = true;
  await sb.rpc("finish_game", { p_game_id: GAME_ID, p_status: status, p_winner_id: winnerId });
}

// ---------------- Realtime sync ----------------
// חלק מהתקשורת בזמן-אמת (WebSocket) עלולה לא לעבוד ברשתות עם סינון תוכן,
// גם אם שאר האתר עובד תקין. לכן, בנוסף להאזנה בזמן-אמת, יש גם בדיקה
// יזומה (polling) כל כמה שניות שמושכת את מצב המשחק ישירות - כדי שהמהלכים
// של היריב יגיעו גם אם ה-WebSocket חסום.
// חשוב: אין להסתמך על עמודת updated_at לצורך זיהוי כפילויות - היא תלויה
// בטריגר בבסיס הנתונים (touch_games_updated_at) שאולי לא רץ אצל כל משתמש
// אם ה-schema לא הורץ מחדש. במקום זאת, משווים את התוכן בפועל (fen/status/הצעת תיקו) -
// כך שהמהלך תמיד יתקבל אצל היריב גם אם הטריגר לא קיים.
let lastAppliedFen = null;
let lastAppliedStatus = null;
let lastAppliedDrawOfferedBy = null;

function applyGameUpdate(newRow) {
  const unchanged =
    lastAppliedFen === newRow.fen &&
    lastAppliedStatus === newRow.status &&
    lastAppliedDrawOfferedBy === newRow.draw_offered_by;
  if (unchanged) {
    return; // באמת שום דבר לא השתנה
  }
  lastAppliedFen = newRow.fen;
  lastAppliedStatus = newRow.status;
  lastAppliedDrawOfferedBy = newRow.draw_offered_by;

  // אפקטי סאונד רק כשהמהלך שהתקבל הוא של היריב (או שאנחנו צופים) - כדי
  // לא להשמיע צליל כפול על המהלכים של עצמנו (שכבר קיבלו צליל ב-makeMove)
  const isOpponentMoveOrSpectator = !MY_COLOR || newRow.turn === MY_COLOR;
  if (isOpponentMoveOrSpectator && newRow.last_move && newRow.status === "active") {
    if (newRow.last_move.includes("x")) playCaptureSound();
    else playMoveSound();
    if (newRow.last_move.includes("+")) playCheckSound();
  }

  const wasActive = GAME.status === "active";
  Object.assign(GAME, newRow);
  chess.load(newRow.fen);
  if (newRow.last_move) {
    try {
      const verboseHistory = chess.history({ verbose: true });
      const lm = verboseHistory[verboseHistory.length - 1];
      lastMoveSquares = lm ? [lm.from, lm.to] : [];
    } catch (e) { /* ignore */ }
  }
  selectedSquare = null;
  legalTargets = [];
  renderBoard();
  renderMoveList();
  renderCapturedPieces();
  renderDrawBanner();
  updateTimersDisplay();
  updateTurnBanner();
  updateLastMoveInfo();

  if (wasActive && newRow.status !== "active") {
    gameEnded = true;
    showEndOverlay();
  }
}

function subscribeGame() {
  lastAppliedFen = GAME.fen;
  lastAppliedStatus = GAME.status;
  lastAppliedDrawOfferedBy = GAME.draw_offered_by;

  sb.channel("game-" + GAME_ID)
    .on(
      "postgres_changes",
      { event: "UPDATE", schema: "public", table: "games", filter: `id=eq.${GAME_ID}` },
      (payload) => applyGameUpdate(payload.new)
    )
    .subscribe();

  // גיבוי: בדיקה יזומה כל 2.5 שניות, למקרה שההתראה בזמן-אמת לא הגיעה
  setInterval(async () => {
    if (gameEnded) return;
    const { data } = await sb.from("games").select("*").eq("id", GAME_ID).single();
    if (data) applyGameUpdate(data);
  }, 2500);
}

// ---------------- Move list ----------------
function renderMoveList() {
  const history = chess.history();
  let html = "";
  for (let i = 0; i < history.length; i += 2) {
    const num = i / 2 + 1;
    html += `<div>${num}. ${history[i] || ""} ${history[i + 1] || ""}</div>`;
  }
  document.getElementById("move-list").innerHTML = html || `<span class="muted">טרם בוצעו מהלכים</span>`;
  const list = document.getElementById("move-list");
  list.scrollTop = list.scrollHeight;
}

// ---------------- כלים שנאכלו + יתרון חומרי ----------------
const PIECE_VALUE = { p: 1, n: 3, b: 3, r: 5, q: 9 };

function renderCapturedPieces() {
  const verboseHistory = chess.history({ verbose: true });
  const capturedByWhite = []; // כלים שחורים שהלבן אכל
  const capturedByBlack = []; // כלים לבנים שהשחור אכל

  verboseHistory.forEach((m) => {
    if (!m.captured) return;
    if (m.color === "w") capturedByWhite.push(m.captured);
    else capturedByBlack.push(m.captured);
  });

  const sortByValue = (arr) => arr.slice().sort((a, b) => (PIECE_VALUE[b] || 0) - (PIECE_VALUE[a] || 0));
  const sumValue = (arr) => arr.reduce((sum, t) => sum + (PIECE_VALUE[t] || 0), 0);

  const whiteValue = sumValue(capturedByWhite);
  const blackValue = sumValue(capturedByBlack);
  const advantage = whiteValue - blackValue;

  const piecesHtml = (arr, color) =>
    sortByValue(arr)
      .map((t) => `<span class="captured-piece ${color === "w" ? "piece-white" : "piece-black"}">${PIECE_UNICODE[color + t.toUpperCase()]}</span>`)
      .join("");

  const whiteEl = document.getElementById("white-captured");
  const blackEl = document.getElementById("black-captured");
  if (whiteEl) {
    whiteEl.innerHTML =
      piecesHtml(capturedByWhite, "b") + (advantage > 0 ? `<span class="captured-advantage">+${advantage}</span>` : "");
  }
  if (blackEl) {
    blackEl.innerHTML =
      piecesHtml(capturedByBlack, "w") + (advantage < 0 ? `<span class="captured-advantage">+${-advantage}</span>` : "");
  }
}

// ---------------- Timers ----------------
function startTimerLoop() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(async () => {
    updateTimersDisplay();
    if (GAME.status !== "active" || gameEnded) return;
    if (!GAME.white_id || !GAME.black_id) return;

    const now = Date.now();
    const lastMoveAt = new Date(GAME.last_move_at).getTime();
    const elapsed = now - lastMoveAt;
    const sideToMove = GAME.turn;
    const remaining = (sideToMove === "w" ? GAME.white_time_ms : GAME.black_time_ms) - elapsed;

    if (remaining <= 0 && MY_COLOR) {
      const winnerId = sideToMove === "w" ? GAME.black_id : GAME.white_id;
      await finishGame("timeout", winnerId);
    }
  }, 400);
}

function updateTimersDisplay() {
  const now = Date.now();
  const lastMoveAt = new Date(GAME.last_move_at).getTime();
  const elapsed = GAME.status === "active" ? now - lastMoveAt : 0;

  let whiteRemaining = GAME.white_time_ms;
  let blackRemaining = GAME.black_time_ms;
  if (GAME.status === "active") {
    if (GAME.turn === "w") whiteRemaining -= elapsed;
    else blackRemaining -= elapsed;
  }
  whiteRemaining = Math.max(0, whiteRemaining);
  blackRemaining = Math.max(0, blackRemaining);

  const whiteEl = document.getElementById("white-timer");
  const blackEl = document.getElementById("black-timer");
  whiteEl.textContent = formatTime(whiteRemaining);
  blackEl.textContent = formatTime(blackRemaining);

  whiteEl.parentElement.classList.toggle("active", GAME.turn === "w" && GAME.status === "active");
  blackEl.parentElement.classList.toggle("active", GAME.turn === "b" && GAME.status === "active");
  whiteEl.parentElement.classList.toggle("low", whiteRemaining < 20000);
  blackEl.parentElement.classList.toggle("low", blackRemaining < 20000);
}

// ---------------- Controls: resign / draw ----------------
function updateControlsVisibility() {
  const controls = document.getElementById("game-controls");
  controls.style.display = MY_COLOR && GAME.status === "active" ? "flex" : "none";
  renderDrawBanner();
}

function renderDrawBanner() {
  const banner = document.getElementById("draw-banner");
  if (!MY_COLOR || GAME.status !== "active" || !GAME.draw_offered_by) {
    banner.style.display = "none";
    return;
  }
  if (GAME.draw_offered_by === ME.id) {
    banner.style.display = "flex";
    banner.innerHTML = `<span>הצעת תיקו נשלחה, ממתין לתגובת היריב...</span>`;
  } else {
    banner.style.display = "flex";
    banner.innerHTML = `
      <span>היריב הציע תיקו</span>
      <div class="flex gap-1">
        <button class="btn btn-accent" id="accept-draw" style="padding:6px 14px;font-size:13px;">✔️ קבל</button>
        <button class="btn btn-ghost" id="decline-draw" style="padding:6px 14px;font-size:13px;">✖️ דחה</button>
      </div>`;
    document.getElementById("accept-draw").onclick = async () => {
      await finishGame("draw", null);
    };
    document.getElementById("decline-draw").onclick = async () => {
      await sb.from("games").update({ draw_offered_by: null }).eq("id", GAME_ID);
    };
  }
}

function wireControls() {
  document.getElementById("resign-btn").addEventListener("click", async () => {
    if (!confirm("האם אתה בטוח שברצונך להיכנע?")) return;
    if (IS_AI_GAME) {
      aiFinishGame("resigned", "ai");
      return;
    }
    const winnerId = MY_COLOR === "w" ? GAME.black_id : GAME.white_id;
    await finishGame("resigned", winnerId);
  });

  document.getElementById("draw-btn").addEventListener("click", async () => {
    await sb.from("games").update({ draw_offered_by: ME.id }).eq("id", GAME_ID);
  });

  document.getElementById("report-btn").addEventListener("click", async () => {
    const opponentId = MY_COLOR === "w" ? GAME.black_id : GAME.white_id;
    if (!opponentId) return;
    const reason = prompt("תאר בקצרה את הבעיה שברצונך לדווח עליה:");
    if (!reason) return;
    const { error } = await sb.from("reports").insert({
      reporter_id: ME.id,
      reported_id: opponentId,
      game_id: GAME_ID,
      reason,
    });
    toast(error ? "שגיאה בשליחת הדיווח" : "הדיווח נשלח לצוות הניהול", error ? "error" : "success");
  });

  document.getElementById("chat-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const input = document.getElementById("chat-input");
    const msg = input.value.trim();
    if (!msg) return;
    input.value = "";
    await sb.from("chat_messages").insert({ game_id: GAME_ID, sender_id: ME.id, message: msg });
  });
}

// ---------------- End overlay ----------------
function showEndOverlay() {
  clearInterval(timerInterval);
  const overlay = document.getElementById("end-overlay");
  overlay.style.display = "flex";

  let title, subtitle, emoji;
  const iAmWinner = GAME.winner_id && GAME.winner_id === ME.id;
  const isDraw = GAME.status === "draw";

  switch (GAME.status) {
    case "checkmate": title = "שח-מט!"; emoji = "♚"; break;
    case "resigned": title = "המשחק הסתיים בכניעה"; emoji = "🏳️"; break;
    case "timeout": title = "נגמר הזמן!"; emoji = "⏱️"; break;
    case "draw": title = "המשחק הסתיים בתיקו"; emoji = "🤝"; break;
    default: title = "המשחק הסתיים"; emoji = "♟️";
  }

  if (isDraw) {
    subtitle = "תיקו הוגן — כל הכבוד לשני הצדדים";
  } else if (!MY_COLOR) {
    const winnerName = GAME.winner_id === GAME.white_id ? GAME.white?.username : GAME.black?.username;
    subtitle = `${winnerName || "שחקן"} ניצח/ה במשחק`;
  } else if (iAmWinner) {
    subtitle = "ניצחת! הדירוג והנקודות שלך עודכנו 🎉";
  } else {
    subtitle = "הפסדת הפעם — נסה שוב!";
  }

  document.getElementById("end-title").textContent = `${emoji} ${title}`;
  document.getElementById("end-subtitle").textContent = subtitle;

  if (isDraw) {
    playDrawSound();
  } else if (MY_COLOR && iAmWinner) {
    playWinSound();
  } else if (MY_COLOR) {
    playLoseSound();
  }

  if (MY_COLOR && iAmWinner) launchConfetti();

  document.getElementById("game-controls").style.display = "none";
  document.getElementById("draw-banner").style.display = "none";
}

// ---------------- In-game chat ----------------
const seenChatIds = new Set();

async function loadChat() {
  const { data } = await sb
    .from("chat_messages")
    .select("id, message, created_at, sender_id, sender:sender_id(username)")
    .eq("game_id", GAME_ID)
    .order("created_at", { ascending: true })
    .limit(100);
  const box = document.getElementById("chat-messages");
  box.innerHTML = "";
  seenChatIds.clear();
  (data || []).forEach((m) => appendChatMessage(m));
  box.scrollTop = box.scrollHeight;
}

function appendChatMessage(m) {
  if (seenChatIds.has(m.id)) return;
  seenChatIds.add(m.id);
  const box = document.getElementById("chat-messages");
  const mine = m.sender_id === ME.id;
  const div = document.createElement("div");
  div.className = "chat-msg" + (mine ? " me" : "");
  div.innerHTML = `<span class="sender">${escapeHtml(m.sender?.username || "משתמש")}</span>${escapeHtml(m.message)}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function subscribeChat() {
  sb.channel("game-chat-" + GAME_ID)
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "chat_messages", filter: `game_id=eq.${GAME_ID}` },
      async (payload) => {
        const { data: sender } = await sb.from("profiles").select("username").eq("id", payload.new.sender_id).single();
        appendChatMessage({ ...payload.new, sender });
      }
    )
    .subscribe();

  // גיבוי: משיכת הודעות חדשות כל 2.5 שניות למקרה שהתראת הזמן-האמת לא הגיעה
  setInterval(async () => {
    const { data } = await sb
      .from("chat_messages")
      .select("id, message, created_at, sender_id, sender:sender_id(username)")
      .eq("game_id", GAME_ID)
      .order("created_at", { ascending: true })
      .limit(100);
    (data || []).forEach((m) => appendChatMessage(m));
  }, 2500);
}

      boardGroup.add(m);
    });

    // עיטורי פינות זהב
    const cornerGeo = new THREE.SphereGeometry(0.22, 20, 20);
    const half = outerSize / 2 - 0.32;
    [
      [-half, -half],
      [half, -half],
      [-half, half],
      [half, half],
    ].forEach(([x, z]) => {
      const m = new THREE.Mesh(cornerGeo, MAT.gold);
      m.position.set(x, -0.02, z);
      m.castShadow = true;
      boardGroup.add(m);
    });

    scene.add(boardGroup);
  }

  // ---------------- בניית כלים (גיאומטריה מסוגננת ברמת פרימיום) ----------------
  function addBaseCollar(group, color, radius, y) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.025, 10, 24), pieceAccentMat(color));
    ring.rotation.x = Math.PI / 2;
    ring.position.y = y;
    ring.castShadow = true;
    group.add(ring);
  }

  function buildPieceMesh(type, color) {
    const group = new THREE.Group();
    const body = pieceBodyMat(color);
    const accent = pieceAccentMat(color);

    function cyl(rt, rb, h, y, mat, segs) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs || 24), mat || body);
      m.position.y = y;
      m.castShadow = true;
      m.receiveShadow = true;
      group.add(m);
      return m;
    }
    function sph(r, y, mat, segs) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(r, segs || 20, segs || 20), mat || body);
      m.position.y = y;
      m.castShadow = true;
      group.add(m);
      return m;
    }

    // בסיס משותף לכל הכלים
    cyl(0.27, 0.3, 0.09, 0.045);
    addBaseCollar(group, color, 0.29, 0.1);

    if (type === "p") {
      cyl(0.16, 0.2, 0.16, 0.17);
      cyl(0.08, 0.13, 0.2, 0.34);
      sph(0.15, 0.48);
    } else if (type === "r") {
      cyl(0.21, 0.24, 0.34, 0.26);
      const top = cyl(0.25, 0.21, 0.09, 0.47);
      top;
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2;
        const cren = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.09), body);
        cren.position.set(Math.cos(ang) * 0.2, 0.565, Math.sin(ang) * 0.2);
        cren.castShadow = true;
        group.add(cren);
      }
      addBaseCollar(group, color, 0.22, 0.42);
    } else if (type === "b") {
      cyl(0.13, 0.21, 0.4, 0.29);
      addBaseCollar(group, color, 0.19, 0.44);
      sph(0.14, 0.53);
      const slit = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.14, 0.03), accent);
      slit.position.y = 0.62;
      slit.rotation.z = 0.5;
      group.add(slit);
      sph(0.05, 0.7, accent, 10);
    } else if (type === "n") {
      // גוף/צוואר
      const neck = cyl(0.16, 0.22, 0.34, 0.28);
      neck.rotation.z = 0.18;
      // ראש (מוארך, מסוגנן)
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.22, 0.32), body);
      head.position.set(0.09, 0.52, 0.02);
      head.rotation.z = -0.15;
      head.castShadow = true;
      group.add(head);
      // חוטם
      const muzzle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.11, 0.2), body);
      muzzle.position.set(0.15, 0.44, 0.14);
      muzzle.castShadow = true;
      group.add(muzzle);
      // אוזניים
      [-0.06, 0.06].forEach((dz) => {
        const ear = new THREE.Mesh(new THREE.ConeGeometry(0.045, 0.13, 10), body);
        ear.position.set(0.05, 0.66, dz);
        ear.rotation.x = -0.2;
        ear.castShadow = true;
        group.add(ear);
      });
      // רעמה - טבעות זהב קטנות לאורך הגב
      for (let i = 0; i < 3; i++) {
        const m = new THREE.Mesh(new THREE.TorusGeometry(0.1 - i * 0.015, 0.018, 8, 16), accent);
        m.position.set(-0.05, 0.38 + i * 0.09, -0.08);
        m.rotation.y = Math.PI / 2;
        m.castShadow = true;
        group.add(m);
      }
      addBaseCollar(group, color, 0.2, 0.14);
    } else if (type === "q") {
      cyl(0.15, 0.22, 0.42, 0.31);
      addBaseCollar(group, color, 0.2, 0.51);
      const crownBase = new THREE.Mesh(new THREE.TorusGeometry(0.19, 0.045, 12, 24), accent);
      crownBase.rotation.x = Math.PI / 2;
      crownBase.position.y = 0.58;
      crownBase.castShadow = true;
      group.add(crownBase);
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2;
        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.035, 0.14, 10), accent);
        spike.position.set(Math.cos(ang) * 0.16, 0.68, Math.sin(ang) * 0.16);
        spike.castShadow = true;
        group.add(spike);
      }
      sph(0.09, 0.72, body, 16);
    } else if (type === "k") {
      cyl(0.17, 0.24, 0.48, 0.33);
      addBaseCollar(group, color, 0.22, 0.57);
      const jewelBand = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.04, 12, 24), accent);
      jewelBand.rotation.x = Math.PI / 2;
      jewelBand.position.y = 0.62;
      jewelBand.castShadow = true;
      group.add(jewelBand);
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2;
        const jewel = new THREE.Mesh(new THREE.SphereGeometry(0.028, 10, 10), MAT.kingGlow);
        jewel.position.set(Math.cos(ang) * 0.2, 0.62, Math.sin(ang) * 0.2);
        group.add(jewel);
      }
      sph(0.1, 0.7, body, 16);
      const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.22, 0.04), MAT.kingGlow);
      crossV.position.y = 0.86;
      group.add(crossV);
      const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.04, 0.04), MAT.kingGlow);
      crossH.position.y = 0.82;
      group.add(crossH);
    }

    group.userData.pieceType = type;
    group.userData.pieceColor = color;
    group.userData.baseScale = { x: 1, y: 1, z: 1 };
    return group;
  }

  // ---------------- אורות + מצלמה + רינדור ----------------
  function buildLights() {
    ambientLight = new THREE.AmbientLight(0x404050, BASE_AMBIENT);
    scene.add(ambientLight);

    keyLight = new THREE.DirectionalLight(0xfff2d9, BASE_KEY);
    keyLight.position.set(-5, 8, 4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.left = -6;
    keyLight.shadow.camera.right = 6;
    keyLight.shadow.camera.top = 6;
    keyLight.shadow.camera.bottom = -6;
    keyLight.shadow.bias = -0.0015;
    scene.add(keyLight);

    fillLight = new THREE.DirectionalLight(0x5e8bff, BASE_FILL);
    fillLight.position.set(6, 4, -5);
    scene.add(fillLight);
  }

  function buildComposer() {
    if (!window.THREE || !THREE.EffectComposer || !THREE.UnrealBloomPass) return null;
    const c = new THREE.EffectComposer(renderer);
    c.addPass(new THREE.RenderPass(scene, camera));
    const bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(containerEl.clientWidth, containerEl.clientHeight),
      0.55,
      0.4,
      0.82
    );
    c.addPass(bloom);
    return c;
  }

  function ensureScene(container) {
    containerEl = container;
    scene = new THREE.Scene();
    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(42, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 8.6, 7.4);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    if (THREE.ACESFilmicToneMapping) renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    if (renderer.outputEncoding !== undefined && THREE.sRGBEncoding) renderer.outputEncoding = THREE.sRGBEncoding;
    container.innerHTML = "";
    container.appendChild(renderer.domElement);

    buildMaterials();
    buildLights();
    buildBoard();

    if (THREE.OrbitControls) {
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 6;
      controls.maxDistance = 14;
      controls.minPolarAngle = 0.35;
      controls.maxPolarAngle = 1.15;
      controls.enablePan = false;
      controls.target.set(0, 0, 0);
    }

    composer = buildComposer();

    raycaster = new THREE.Raycaster();
    mouseVec = new THREE.Vector2();

    renderer.domElement.addEventListener("click", handleClick);
    renderer.domElement.addEventListener("pointermove", handlePointerMove);

    resizeHandler = function () {
      if (!active) return;
      const w = containerEl.clientWidth,
        h = containerEl.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      if (composer) composer.setSize(w, h);
    };
    window.addEventListener("resize", resizeHandler);
  }

  // ---------------- קליקים / ריחוף ----------------
  function findSquareFromIntersect(obj) {
    let o = obj;
    while (o) {
      if (o.userData && o.userData.square) return o.userData.square;
      o = o.parent;
    }
    return null;
  }

  function handleClick(ev) {
    if (!active) return;
    const rect = renderer.domElement.getBoundingClientRect();
    mouseVec.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    mouseVec.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    if (intersects.length && onSquareClickCb) {
      const square = findSquareFromIntersect(intersects[0].object);
      if (square) onSquareClickCb(square);
    }
  }

  function handlePointerMove(ev) {
    if (!active) return;
    const rect = renderer.domElement.getBoundingClientRect();
    mouseVec.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    mouseVec.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    let square = null;
    if (intersects.length) square = findSquareFromIntersect(intersects[0].object);
    if (square !== hoveredSquare) {
      if (hoveredSquare && pieceGroups[hoveredSquare]) {
        addTween(pieceGroups[hoveredSquare].position, "y", pieceGroups[hoveredSquare].position.y, 0, 150);
      }
      hoveredSquare = square;
      if (hoveredSquare && pieceGroups[hoveredSquare]) {
        addTween(pieceGroups[hoveredSquare].position, "y", pieceGroups[hoveredSquare].position.y, 0.1, 150);
      }
    }
  }

  // ---------------- מנוע טווין פשוט ----------------
  function addTween(obj, prop, from, to, duration, onComplete, ease) {
    activeTweens.push({ obj, prop, from, to, duration, elapsed: 0, ease: ease || easeInOutCubic, onComplete });
  }
  function addTweenVec(obj, propName, toVec, duration, onComplete, ease) {
    const from = obj[propName].clone();
    activeTweens.push({
      obj,
      propName,
      vecFrom: from,
      vecTo: toVec.clone(),
      duration,
      elapsed: 0,
      isVec: true,
      ease: ease || easeInOutCubic,
      onComplete,
    });
  }
  function updateTweens(dtMs) {
    for (let i = activeTweens.length - 1; i >= 0; i--) {
      const tw = activeTweens[i];
      tw.elapsed += dtMs;
      const t = Math.min(tw.elapsed / tw.duration, 1);
      const e = tw.ease(t);
      if (tw.isVec) {
        tw.obj[tw.propName].lerpVectors(tw.vecFrom, tw.vecTo, e);
      } else {
        tw.obj[tw.prop] = tw.from + (tw.to - tw.from) * e;
      }
      if (t >= 1) {
        activeTweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }

  // ---------------- מיקום/עדכון כלים לפי מצב לוח ----------------
  function placeGroupAtSquare(group, square, flip) {
    const pos = squareToWorld(square, flip);
    group.position.set(pos.x, 0, pos.z);
  }

  function popInAt(square, piece, flip) {
    const g = buildPieceMesh(piece.type, piece.color);
    placeGroupAtSquare(g, square, flip);
    g.scale.set(0.001, 0.001, 0.001);
    scene.add(g);
    pieceGroups[square] = g;
    addTween(g.scale, "x", 0.001, 1, 320, null, easeOutBack);
    addTween(g.scale, "y", 0.001, 1, 320, null, easeOutBack);
    addTween(g.scale, "z", 0.001, 1, 320, null, easeOutBack);
  }

  function fadeOutAt(square) {
    const g = pieceGroups[square];
    if (!g) return;
    delete pieceGroups[square];
    addTween(g.scale, "x", g.scale.x, 0.001, 260, () => scene.remove(g));
    addTween(g.scale, "y", g.scale.y, 0.001, 260);
    addTween(g.scale, "z", g.scale.z, 0.001, 260);
  }

  function animateSlide(fromSquare, toSquare, piece, flip) {
    const g = pieceGroups[fromSquare];
    if (!g) {
      popInAt(toSquare, piece, flip);
      return;
    }
    delete pieceGroups[fromSquare];
    pieceGroups[toSquare] = g;
    const targetPos = squareToWorld(toSquare, flip);
    addTweenVec(g, "position", new THREE.Vector3(targetPos.x, 0, targetPos.z), 250, null, easeInOutCubic);
    // קפיצה קלה בגובה תוך כדי תנועה
    addTween(g.position, "y", 0, 0.22, 125, () => {
      addTween(g.position, "y", 0.22, 0, 125);
    });
  }

  function pairAndAnimate(removed, added, flip) {
    const usedAdded = new Array(added.length).fill(false);
    removed.forEach((rem) => {
      let bestIdx = -1,
        bestDist = Infinity;
      added.forEach((add, idx) => {
        if (usedAdded[idx]) return;
        if (add.piece.type !== rem.piece.type || add.piece.color !== rem.piece.color) return;
        const d = squareDistance(rem.square, add.square);
        if (d < bestDist) {
          bestDist = d;
          bestIdx = idx;
        }
      });
      if (bestIdx >= 0) {
        usedAdded[bestIdx] = true;
        animateSlide(rem.square, added[bestIdx].square, added[bestIdx].piece, flip);
      } else {
        fadeOutAt(rem.square);
      }
    });
    added.forEach((add, idx) => {
      if (!usedAdded[idx]) popInAt(add.square, add.piece, flip);
    });
  }

  function rebuildAllPieces(layout, flip) {
    Object.keys(pieceGroups).forEach((sq) => scene.remove(pieceGroups[sq]));
    pieceGroups = {};
    Object.keys(layout).forEach((sq) => {
      const g = buildPieceMesh(layout[sq].type, layout[sq].color);
      placeGroupAtSquare(g, sq, flip);
      scene.add(g);
      pieceGroups[sq] = g;
    });
  }

  function applyLayout(layout, flip) {
    const flipChanged = flip !== currentFlip;
    currentFlip = flip;
    if (flipChanged) {
      rebuildAllPieces(layout, flip);
      prevLayout = JSON.parse(JSON.stringify(layout));
      return;
    }
    const removed = [],
      added = [];
    const allSquares = new Set(Object.keys(prevLayout).concat(Object.keys(layout)));
    allSquares.forEach((sq) => {
      const before = prevLayout[sq],
        after = layout[sq];
      const same = before && after && before.type === after.type && before.color === after.color;
      if (same) return;
      if (before) removed.push({ square: sq, piece: before });
      if (after) added.push({ square: sq, piece: after });
    });
    if (removed.length === 0 && added.length === 0) return;
    // אתחול ראשוני (אין מצב קודם) — בונים הכל בלי אנימציה
    if (Object.keys(prevLayout).length === 0) {
      rebuildAllPieces(layout, flip);
    } else {
      pairAndAnimate(removed, added, flip);
    }
    prevLayout = JSON.parse(JSON.stringify(layout));
  }

  // ---------------- הדגשות: בחירה / מהלכים חוקיים / שח / מט ----------------
  function clearHighlights() {
    if (selectionMesh) {
      scene.remove(selectionMesh);
      selectionMesh = null;
    }
    legalMarkers.forEach((m) => scene.remove(m));
    legalMarkers = [];
  }

  function updateHighlights(selectedSquare, legalTargets, flip) {
    clearHighlights();
    if (selectedSquare) {
      const pos = squareToWorld(selectedSquare, flip);
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.42, 0.045, 12, 32),
        new THREE.MeshStandardMaterial({
          color: 0xd4af37,
          emissive: 0xd4af37,
          emissiveIntensity: 1,
          transparent: true,
          opacity: 0.9,
        })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.set(pos.x, 0.03, pos.z);
      ring.userData.pulse = true;
      scene.add(ring);
      selectionMesh = ring;
    }
    (legalTargets || []).forEach((t) => {
      const pos = squareToWorld(t.to, flip);
      let marker;
      if (t.captured) {
        marker = new THREE.Mesh(
          new THREE.TorusGeometry(0.44, 0.045, 10, 28),
          new THREE.MeshStandardMaterial({
            color: 0xd32f2f,
            emissive: 0xd32f2f,
            emissiveIntensity: 0.9,
            transparent: true,
            opacity: 0.8,
          })
        );
        marker.rotation.x = Math.PI / 2;
        marker.position.set(pos.x, 0.04, pos.z);
      } else {
        marker = new THREE.Mesh(
          new THREE.SphereGeometry(0.1, 16, 16),
          new THREE.MeshPhysicalMaterial({
            color: 0x5e8bff,
            emissive: 0x5e8bff,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.55,
            roughness: 0.1,
            transmission: 0.25,
          })
        );
        marker.position.set(pos.x, 0.16, pos.z);
      }
      marker.userData.pulse = true;
      scene.add(marker);
      legalMarkers.push(marker);
    });
  }

  function clearCheckState() {
    if (checkGlowMesh) {
      scene.remove(checkGlowMesh);
      checkGlowMesh = null;
    }
    if (checkmateSpot) {
      scene.remove(checkmateSpot);
      checkmateSpot = null;
    }
    if (checkmateActive) {
      checkmateActive = false;
      addTween(ambientLight, "intensity", ambientLight.intensity, BASE_AMBIENT, 700);
      addTween(keyLight, "intensity", keyLight.intensity, BASE_KEY, 700);
      addTween(fillLight, "intensity", fillLight.intensity, BASE_FILL, 700);
    }
  }

  function findKingSquare(board2d, color) {
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        const p = board2d[row][col];
        if (p && p.type === "k" && p.color === color) {
          return FILES[col] + (8 - row);
        }
      }
    }
    return null;
  }

  function updateCheckState(board2d, inCheck, turn, isCheckmate, flip) {
    if (!inCheck) {
      clearCheckState();
      return;
    }
    const kingSquare = findKingSquare(board2d, turn);
    if (!kingSquare) {
      clearCheckState();
      return;
    }
    const pos = squareToWorld(kingSquare, flip);

    if (!checkGlowMesh) {
      checkGlowMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.42, 20, 20),
        new THREE.MeshBasicMaterial({ color: 0xd32f2f, transparent: true, opacity: 0.28 })
      );
      scene.add(checkGlowMesh);
    }
    checkGlowMesh.position.set(pos.x, 0.4, pos.z);
    checkGlowMesh.userData.pulse = true;

    if (isCheckmate && !checkmateActive) {
      checkmateActive = true;
      checkmateSpot = new THREE.SpotLight(0xfff2d9, 3.2, 12, Math.PI / 10, 0.4, 1.2);
      checkmateSpot.position.set(pos.x, 6, pos.z);
      checkmateSpot.target.position.set(pos.x, 0, pos.z);
      checkmateSpot.castShadow = true;
      scene.add(checkmateSpot);
      scene.add(checkmateSpot.target);
      addTween(ambientLight, "intensity", ambientLight.intensity, BASE_AMBIENT * 0.35, 800);
      addTween(keyLight, "intensity", keyLight.intensity, BASE_KEY * 0.3, 800);
      addTween(fillLight, "intensity", fillLight.intensity, BASE_FILL * 0.3, 800);
    } else if (!isCheckmate && checkmateActive) {
      clearCheckState();
    }
  }

  // ---------------- לולאת רינדור ----------------
  function animate() {
    rafId = requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const dtMs = dt * 1000;
    const t = clock.elapsedTime;

    updateTweens(dtMs);

    if (selectionMesh) {
      const s = 1 + Math.sin(t * 4) * 0.06;
      selectionMesh.scale.set(s, 1, s);
    }
    legalMarkers.forEach((m, i) => {
      const s = 1 + Math.sin(t * 3.5 + i) * 0.12;
      m.scale.set(s, s, s);
    });
    if (checkGlowMesh) {
      checkGlowMesh.material.opacity = 0.2 + Math.abs(Math.sin(t * 3.2)) * 0.28;
    }

    if (controls) controls.update();
    if (composer) composer.render();
    else renderer.render(scene, camera);
  }

  // ---------------- API ----------------
  function init(container, opts) {
    opts = opts || {};
    onSquareClickCb = opts.onSquareClick || null;
    ensureScene(container);
    active = true;
    prevLayout = {};
    clock.start();
    animate();
  }

  function destroy() {
    active = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if (resizeHandler) window.removeEventListener("resize", resizeHandler);
    if (renderer) {
      renderer.domElement.removeEventListener("click", handleClick);
      renderer.domElement.removeEventListener("pointermove", handlePointerMove);
      renderer.dispose();
      if (renderer.domElement && renderer.domElement.parentNode) {
        renderer.domElement.parentNode.removeChild(renderer.domElement);
      }
    }
    scene = null;
    camera = null;
    renderer = null;
    controls = null;
    composer = null;
    squareMeshes = {};
    pieceGroups = {};
    prevLayout = {};
    selectionMesh = null;
    legalMarkers = [];
    checkGlowMesh = null;
    checkmateSpot = null;
    checkmateActive = false;
  }

  function sync(state) {
    if (!active || !scene) return;
    const layout = {};
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        const p = state.board[row][col];
        if (p) layout[FILES[col] + (8 - row)] = { type: p.type, color: p.color };
      }
    }
    applyLayout(layout, !!state.flip);
    updateHighlights(state.selectedSquare, state.legalTargets, !!state.flip);
    updateCheckState(state.board, state.inCheck, state.turn, state.checkmate, !!state.flip);
  }

  function isActive() {
    return active;
  }

  return { init, destroy, sync, isActive };
})();
window.Board3D = Board3D;

// ===================================================================
// Board3D loader + חיווט לכפתור התצוגה התלת-ממדית בעמוד המשחק.
// טוען את Three.js וההרחבות שלו מ-CDN רק כשלוחצים על הכפתור (lazy load),
// כדי לא להאט את טעינת עמוד המשחק הרגיל. במקרה של כשל רשת/WebGL —
// חוזרים בצורה חלקה ללוח ה-2D הרגיל (שממשיך לעבוד בדיוק כמו קודם).
// ===================================================================
(function () {
  "use strict";

  const THREE_BASE = "https://cdn.jsdelivr.net/npm/three@0.128.0/";
  const THREE_FILES = [
    THREE_BASE + "build/three.min.js",
    THREE_BASE + "examples/js/shaders/CopyShader.js",
    THREE_BASE + "examples/js/shaders/LuminosityHighPassShader.js",
    THREE_BASE + "examples/js/postprocessing/Pass.js",
    THREE_BASE + "examples/js/postprocessing/EffectComposer.js",
    THREE_BASE + "examples/js/postprocessing/RenderPass.js",
    THREE_BASE + "examples/js/postprocessing/ShaderPass.js",
    THREE_BASE + "examples/js/postprocessing/UnrealBloomPass.js",
    THREE_BASE + "examples/js/controls/OrbitControls.js",
  ];

  let threeLoaded = false;
  let threeLoadingPromise = null;

  function hasWebGL() {
    try {
      const c = document.createElement("canvas");
      return !!(window.WebGLRenderingContext && (c.getContext("webgl") || c.getContext("experimental-webgl")));
    } catch (e) {
      return false;
    }
  }

  async function loadScriptText(url) {
    const resp = await fetchWithTimeout(url, {}, 20000);
    if (!resp.ok) throw new Error("HTTP " + resp.status + " עבור " + url);
    const code = await resp.text();
    const s = document.createElement("script");
    s.textContent = code;
    document.head.appendChild(s);
  }

  function ensureThreeLoaded() {
    if (threeLoaded) return Promise.resolve();
    if (threeLoadingPromise) return threeLoadingPromise;
    threeLoadingPromise = (async () => {
      for (const url of THREE_FILES) {
        await loadScriptText(url);
      }
      if (!window.THREE) throw new Error("THREE לא נטען כראוי");
      threeLoaded = true;
    })();
    return threeLoadingPromise;
  }

  function currentState3D() {
    return {
      board: chess.board(),
      selectedSquare,
      legalTargets,
      inCheck: chess.in_check(),
      turn: chess.turn(),
      lastMoveSquares,
      flip: orientation() === "black",
      gameEnded,
      checkmate: chess.in_checkmate(),
    };
  }

  // חיבור לתוך renderBoard הקיים — בלי לגעת בלוגיקת המשחק עצמה.
  // בכל פעם שהלוח ה-2D מתעדכן, אם מצב ה-3D פעיל, גם הוא מתעדכן לאותו מצב.
  const _origRenderBoard = renderBoard;
  renderBoard = function () {
    _origRenderBoard();
    if (window.Board3D && Board3D.isActive()) {
      Board3D.sync(currentState3D());
    }
  };

  async function enable3D() {
    const btn = document.getElementById("toggle-3d-btn");
    const loading = document.getElementById("board3d-loading");
    const container = document.getElementById("board3d-container");
    const board2d = document.getElementById("board");
    if (!hasWebGL()) {
      toast("הדפדפן/המכשיר שלך לא תומך בתצוגה תלת-ממדית - נשארים בלוח הרגיל", "error");
      return;
    }
    loading.style.display = "flex";
    try {
      await ensureThreeLoaded();
      board2d.style.display = "none";
      container.style.display = "block";
      loading.style.display = "none";
      Board3D.init(container, { onSquareClick });
      Board3D.sync(currentState3D());
      btn.classList.add("active");
      sessionStorage.setItem("koshermat_board3d", "1");
    } catch (e) {
      loading.style.display = "none";
      toast("התצוגה התלת-ממדית לא נטענה - בדוק את החיבור לאינטרנט ונסה שוב", "error");
    }
  }

  function disable3D() {
    const btn = document.getElementById("toggle-3d-btn");
    const container = document.getElementById("board3d-container");
    const board2d = document.getElementById("board");
    Board3D.destroy();
    container.style.display = "none";
    board2d.style.display = "grid";
    btn.classList.remove("active");
    sessionStorage.removeItem("koshermat_board3d");
  }

  function wireToggleButton() {
    const btn = document.getElementById("toggle-3d-btn");
    if (!btn) return;
    btn.addEventListener("click", function () {
      if (window.Board3D && Board3D.isActive()) {
        disable3D();
      } else {
        enable3D();
      }
    });
  }
  // הכפתור כבר קיים ב-DOM בשלב הזה (הסקריפט טעון אחרי ה-HTML של העמוד),
  // לכן מחווטים ישירות בלי להמתין ל-DOMContentLoaded (שאולי כבר קרה).
  wireToggleButton();
})();

  </script>
</body>
</html>
