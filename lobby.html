<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>לובי — כושרמט</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
<link rel="stylesheet" href="css/style.css?v=20" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="wrap page-enter">
    <div class="lobby-grid">

      <!-- עמודה ימנית: פרופיל ומדליות -->
      <div class="flex flex-col gap-2">
        <div class="card" id="profile-card"></div>
        <div class="card">
          <div class="section-title" style="font-size:16px;">🏅 מדליות</div>
          <div class="medal-grid" id="medal-grid"></div>
        </div>
      </div>

      <!-- עמודה מרכזית: שידוך + משחקים חיים -->
      <div class="flex flex-col gap-2">
        <div class="card queue-btn-wrap">
          <div class="pulse-ring" id="pulse-ring">♟️</div>
          <button class="btn btn-primary" id="find-btn">🎮 מצא יריב</button>
          <p class="muted mt-1" id="search-status">לחץ כדי להתחיל משחק חדש</p>
        </div>
        <div class="card">
          <div class="section-title" style="font-size:16px;">⚡ משחקים חיים</div>
          <div id="live-games-list"></div>
        </div>
      </div>

      <!-- עמודה שמאלית: תצוגה מקדימה של הודעות פרטיות -->
      <div class="card">
        <div class="flex" style="justify-content:space-between; align-items:center;">
          <div class="section-title" style="font-size:16px; margin:0;">📨 הודעות פרטיות</div>
          <a href="messages.html" class="btn btn-ghost" style="padding:6px 12px; font-size:12px;">פתח הכל</a>
        </div>
        <div id="dm-preview-list"></div>
      </div>

    </div>
  </div>

  <script src="js/supabase-sdk.js?v=20"></script>
  <script src="js/supabaseClient.js?v=20"></script>
  <script src="js/ui.js?v=20"></script>
  <script src="js/lobby.js?v=20"></script>
</body>
</html>
