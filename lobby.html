<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>לובי — כושרמט</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
<link rel="stylesheet" href="css/style.css?v=11" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="wrap page-enter">
    <div class="lobby-grid">

      <!-- עמודה ימנית: פרופיל ומדליות -->
      <div class="flex flex-col gap-2">
        <div class="card" id="profile-card"></div>
        <div class="card">
          <div class="section-title" style="font-size:16px;">🏅 מדליות</div>
          <div class="medal-grid" id="medal-grid"></div>
        </div>
      </div>

      <!-- עמודה מרכזית: שידוך + משחקים חיים -->
      <div class="flex flex-col gap-2">
        <div class="card queue-btn-wrap">
          <div class="pulse-ring" id="pulse-ring">♟️</div>
          <button class="btn btn-primary" id="find-btn">🎮 מצא יריב</button>
          <p class="muted mt-1" id="search-status">לחץ כדי להתחיל משחק חדש</p>
        </div>
        <div class="card">
          <div class="section-title" style="font-size:16px;">⚡ משחקים חיים</div>
          <div id="live-games-list"></div>
        </div>
      </div>

      <!-- עמודה שמאלית: צ'אט גלובלי -->
      <div class="card">
        <div class="section-title" style="font-size:16px;">💬 צ'אט קהילתי</div>
        <div class="chat-box">
          <div class="chat-messages" id="chat-messages"></div>
          <form id="chat-form" class="chat-input-row">
            <input type="text" id="chat-input" placeholder="כתוב הודעה..." autocomplete="off" />
            <button type="submit" class="btn btn-accent" style="padding:10px 16px;">שלח</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js?v=11"></script>
  <script src="js/ui.js?v=11"></script>
  <script src="js/lobby.js?v=11"></script>
</body>
</html>
