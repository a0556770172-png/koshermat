<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>איפוס סיסמה — כושרמט</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
<link rel="stylesheet" href="css/style.css?v=21" />
</head>
<body>
  <div class="center-page page-enter">
    <div class="card" style="width:100%; max-width:420px;">
      <div class="text-center mt-1" style="margin-bottom:22px;">
        <div style="font-size:44px;">🔑</div>
        <div class="brand-text" style="font-size:24px; font-weight:900;">איפוס סיסמה</div>
      </div>

      <div id="reset-status" class="muted text-center" style="margin-bottom:14px;">בודק את הקישור...</div>

      <form id="reset-form" class="flex flex-col gap-1" style="display:none;">
        <div>
          <label>סיסמה חדשה</label>
          <input type="password" id="new-password" required minlength="6" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-1">עדכן סיסמה</button>
      </form>
    </div>
  </div>

  <script src="js/supabase-sdk.js?v=21"></script>
  <script src="js/supabaseClient.js?v=21"></script>
  <script src="js/ui.js?v=21"></script>
  <script src="js/reset-password.js?v=21"></script>
</body>
</html>
