<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>הודעות — כושרמט</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
<link rel="stylesheet" href="css/style.css?v=17" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="wrap page-enter">
    <div class="messages-layout">

      <div class="card">
        <div class="section-title" style="font-size:16px;">💬 שיחות</div>
        <div id="conversations-list"></div>
      </div>

      <div class="card">
        <div class="section-title" style="font-size:16px;" id="conversation-title">בחר שיחה מהרשימה</div>
        <div class="chat-box">
          <div class="chat-messages" id="chat-messages"></div>
          <form id="chat-form" class="chat-input-row" style="display:none;">
            <input type="file" id="attachment-input" accept="image/*,video/*,audio/*" style="display:none;" />
            <button type="button" class="btn btn-ghost" id="attach-btn" style="padding:10px 14px;" title="צירוף תמונה/וידאו/אודיו">📎</button>
            <input type="text" id="chat-input" placeholder="כתוב הודעה..." autocomplete="off" />
            <button type="submit" class="btn btn-accent" style="padding:10px 16px;">שלח</button>
          </form>
          <div class="muted" id="attachment-preview-name" style="font-size:12px; margin-top:4px; display:none;"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js?v=17"></script>
  <script src="js/ui.js?v=17"></script>
  <script src="js/messages.js?v=17"></script>
</body>
</html>
